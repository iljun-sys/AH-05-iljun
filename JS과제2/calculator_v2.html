<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 사칙연산 계산기 v2</title>
    <link rel="stylesheet" href="calculator_style.css">
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly value="0">
    <div class="buttons">
        <!-- 인라인 onclick 을 제거하고, data-* 속성으로 역할만 표시한다.
             실제 클릭 처리는 calculator_v2.js 에서 addEventListener 로 연결한다. -->
        <button class="on-off" data-action="power">ON/OFF</button>
        <button class="clear" data-action="clear">C</button>
        <button class="operator" data-operator="/">/</button>

        <button class="number" data-number="7">7</button>
        <button class="number" data-number="8">8</button>
        <button class="number" data-number="9">9</button>
        <button class="operator" data-operator="*">*</button>

        <button class="number" data-number="4">4</button>
        <button class="number" data-number="5">5</button>
        <button class="number" data-number="6">6</button>
        <button class="operator" data-operator="-">-</button>

        <button class="number" data-number="1">1</button>
        <button class="number" data-number="2">2</button>
        <button class="number" data-number="3">3</button>
        <button class="operator" data-operator="+">+</button>

        <button class="number" data-number=".">.</button>
        <button class="number" data-number="0">0</button>
        <button class="enter" data-action="enter">Enter</button>
    </div>
</div>

<script src="calculator_v2.js"></script>
</body>
</html>
