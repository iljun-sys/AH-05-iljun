<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>암호화폐 가격 변동 추적기</title>
    <link rel="stylesheet" href="cryptocurrency_style.css">
</head>
<body>
    <div class="container">
        <h1>실시간 암호화폐 가격 변동 추적기</h1>

        <div class="tabs">
            <button id="allTab" class="tab-btn active">전체보기</button>
            <button id="favoritesTab" class="tab-btn">관심항목</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="심볼 검색 (예: BTCUSDT)">
        </div>

        <!-- 추가 기능: 마지막 갱신 시각 + 표시/관심 개수 -->
        <div class="status-bar">
            <span id="lastUpdate">마지막 업데이트: -</span>
            <span id="countInfo">표시 0개 · 관심 0개</span>
        </div>

        <div id="loading" class="loading">데이터를 불러오는 중...</div>

        <!-- 좁은 화면에서 표가 넘치면 이 래퍼가 가로 스크롤을 담당 -->
        <div class="table-wrapper">
            <table id="cryptoTable" class="hidden">
                <thead>
                    <tr>
                        <th>관심</th>
                        <!-- 추가 기능: 헤더 클릭 정렬 (data-sort-key + 정렬 방향 화살표) -->
                        <th class="sortable" data-sort-key="symbol">심볼<span class="sort-arrow"></span></th>
                        <th class="sortable" data-sort-key="lastPrice">현재가<span class="sort-arrow"></span></th>
                        <th class="sortable" data-sort-key="priceChangePercent">24시간 변동률<span class="sort-arrow"></span></th>
                        <th class="sortable" data-sort-key="marketCap">시가총액<span class="sort-arrow"></span></th>
                        <th class="sortable" data-sort-key="quoteVolume">거래대금(24h)<span class="sort-arrow"></span></th>
                        <th class="sortable" data-sort-key="highPrice">최고가<span class="sort-arrow"></span></th>
                        <th class="sortable" data-sort-key="lowPrice">최저가<span class="sort-arrow"></span></th>
                    </tr>
                </thead>
                <tbody id="cryptoList">
                    <!-- 데이터가 여기에 동적으로 추가/갱신됩니다 -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="cryptocurrency.js"></script>
</body>
</html>
