<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .container {
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: repeat(4, 200px);
      gap: 10px;
      grid-template-areas: 
                "img1 img3 img3"
                "img1 img4 img6"
                "img2 img2 img6"
                "img5 img5 img5"
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .container .item img:not(:hover) {
      filter: grayscale(1);
      opacity: 0.5;
    }

  </style>

</head>


<body>
  <div class="container">
    <div class="item">
      <div><img src="https://plus.unsplash.com/premium_photo-1688430696418-a3ccf3a4f7e2?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxMXx8fGVufDB8fHx8fA%3D%3D" alt="Image 1"></div>
      <div><img src="https://plus.unsplash.com/premium_photo-1671132513039-c8dc6213cd44?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw2fHx8ZW58MHx8fHx8" alt="Image 2"></div>
      <div><img src="https://images.unsplash.com/photo-1778546979309-d1b70b0d25c2?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw1fHx8ZW58MHx8fHx8" alt="Image 3"></div>
      <div><img src="https://plus.unsplash.com/premium_photo-1688430696418-a3ccf3a4f7e2?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwxMXx8fGVufDB8fHx8fA%3D%3D" alt="Image 1"></div>
      <div><img src="https://plus.unsplash.com/premium_photo-1671132513039-c8dc6213cd44?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw2fHx8ZW58MHx8fHx8" alt="Image 2"></div>
      <div><img src="https://images.unsplash.com/photo-1778546979309-d1b70b0d25c2?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw1fHx8ZW58MHx8fHx8" alt="Image 3"></div>
    </div>

</body>
