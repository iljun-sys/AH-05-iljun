<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>콘솔 사칙연산 계산기</title>
  <script src="calculator.js"></script>
  <style>
    body {
      font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.7;
      color: #222;
    }
    h1 { font-size: 1.5rem; }
    h3 { margin-top: 28px; color: #1979da; }
    hr { border: none; border-top: 1px solid #e4e4e4; }
    code {
      background: #f1f2fb;
      color: #1979da;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.95em;
    }
    .tip {
      background: #fafafa;
      padding: 10px 14px;
      border-radius: 4px;
      margin-top: 20px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <h1>🧮 콘솔창 계산기 프로그램</h1>
  <p>개발자 도구 콘솔에서 실행하는 사칙연산 계산기입니다.</p>

  <h3>Windows</h3>
  <hr>
  <p>1. <code>F12</code> 키를 눌러 콘솔 창을 여세요.</p>
  <p>2. <code>start()</code> 를 입력하여 계산기를 실행합니다.</p>

  <h3>Mac</h3>
  <hr>
  <p>1. <code>Option + Command + I</code> 키를 눌러 콘솔 창을 여세요.</p>
  <p>2. <code>start()</code> 를 입력하여 계산기를 실행합니다.</p>

  <div class="tip">
    <b>바로 계산하기</b><br>
    입력창 없이 바로 계산하려면 <code>start("1 + 2 * 3")</code> 처럼 식을 넣으세요.<br>
    사용법이 궁금하면 <code>help()</code> 를 입력하세요.
  </div>
</body>
</html>
